name: Deploy Dragon Trainer to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dragon-trainer/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: dragon-trainer

      - name: Build
        run: npm run build
        working-directory: dragon-trainer
        env:
          VITE_BASE: /chess-learn/dragon-trainer/

      - name: Prepare Pages structure
        run: |
          mkdir -p site/dragon-trainer
          cp -r dragon-trainer/dist/. site/dragon-trainer/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - uses: actions/deploy-pages@v4
        id: deployment
