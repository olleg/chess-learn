<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Dragon Trainer</title>
  </head>
  <body>
    <div id="app">
      <h1>Dragon Trainer</h1>
      <div id="status-bar"><span id="status-text">Loading...</span></div>
      <div id="board-wrap"><div id="board"></div></div>
      <div id="controls">
        <button id="hint-btn" hidden>Hint</button>
        <button id="new-game-btn">New game</button>
        <button id="sound-btn">🔇</button>
      </div>
      <div id="move-list"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
